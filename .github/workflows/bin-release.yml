name: Release Binary

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  PARENT_REPO: yshell-dev/xcss-core

jobs:
  bin-release:
    name: Bin Update Trigger
    runs-on: ubuntu-latest

    steps:
      - name: Checkout current repo
        uses: actions/checkout@v3

      - name: Checkout xcss-core (read-only)
        uses: actions/checkout@v3
        with:
          repository: yshell-dev/xcss-core
          token: ${{ secrets.XCSS_REPO_CROSS }}
          path: core_repo

      - name: Get version from xcss-core
        id: pacver
        run: |
          cd core_repo
          echo "version=v$(jq -r .version package.json)" >> $GITHUB_OUTPUT

      # - name: Switch back to current repository
      #   run: cd "${GITHUB_WORKSPACE}"

      - name: Run build script
        run: |
          chmod +x ./scripts/build.sh
          ./scripts/build.sh

      - name: Prepare artifacts
        run: |
          mkdir -p artifacts
          cp -r ../bin/* artifacts/

      - name: Publish release (version tag)
        uses: softprops/action-gh-release@v2
        with:
          repository: ${{ env.PARENT_REPO }}
          token: ${{ secrets.XCSS_REPO_CROSS }}
          tag_name: ${{ steps.pacver.outputs.version }}
          name: Release ${{ steps.pacver.outputs.version }}
          body_path: ./release.md
          files: artifacts/**
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.XCSS_REPO_CROSS }}

      - name: Publish release (latest tag)
        uses: softprops/action-gh-release@v2
        with:         
          repository: ${{ env.PARENT_REPO }}
          token: ${{ secrets.XCSS_REPO_CROSS }}
          tag_name: latest
          name: Release latest
          body_path: ./release.md
          files: artifacts/**
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.XCSS_REPO_CROSS }}

  npm-release:
    name: NPM Publish Trigger
    runs-on: ubuntu-latest

    steps:
      - name: Checkout xcss-core (read-only)
        uses: actions/checkout@v3
        with:
          repository: yshell-dev/xcss-core
          token: ${{ secrets.XCSS_REPO_CROSS }}

      - name: Trigger publish workflow on Parent Repo
        uses: peter-evans/repository-dispatch@v2
        with:
          repository: ${{ env.PARENT_REPO }}
          token: ${{ secrets.XCSS_REPO_CROSS }}
          event-type: trigger-publish
