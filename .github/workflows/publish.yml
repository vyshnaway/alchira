name: Release Binary

on:
  branches:
    missions
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bin-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout current repo
        uses: actions/checkout@v3

      - name: Get version from package
        id: pacver
        run: |
          ls
          version=$(< VERSION)
          echo "version=$version" >> $GITHUB_OUTPUT

          patchTag=$version
          echo "patchTag=$patchTag" >> $GITHUB_OUTPUT

          minorTag=$(echo "$version" | cut -d '.' -f1-2)
          echo "minorTag=$minorTag" >> $GITHUB_OUTPUT

          majorTag=$(echo "$version" | cut -d '.' -f1)
          echo "majorTag=$majorTag" >> $GITHUB_OUTPUT

      - name: Run build script
        run: |
          chmod +x ./scripts/build.sh
          ./scripts/build.sh

      - name: Prepare artifacts
        run: |
          mkdir -p artifacts
          cp -r ./bin/* artifacts/

      - name: Checkout Public Repo (read-only)
        uses: actions/checkout@v3
        with:
          repository: ${{ env.PACKAGE_REPO }}
          token: ${{ secrets.ALCHIRA_BINPUB }}
          path: pubrepo

      - run: cd pubrepo

      - name: Publish release (latest tag)
        uses: softprops/action-gh-release@v2
        with:
          repository: ${{ env.PACKAGE_REPO }}
          token: ${{ secrets.ALCHIRA_BINPUB }}
          tag_name: latest
          name: Release latest
          body_path: ./RELEASE.md
          files: artifacts/**
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.ALCHIRA_BINPUB }}

      - name: Publish release (Major Tag)
        uses: softprops/action-gh-release@v2
        with:
          repository: ${{ env.PACKAGE_REPO }}
          token: ${{ secrets.ALCHIRA_BINPUB }}
          tag_name: ${{ steps.pacver.outputs.majorTag }}
          name: Release ${{ steps.pacver.outputs.majorTag }}
          body_path: ./RELEASE.md
          files: artifacts/**
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.ALCHIRA_BINPUB }}

      - name: Publish release (Minor Tag)
        uses: softprops/action-gh-release@v2
        with:
          repository: ${{ env.PACKAGE_REPO }}
          token: ${{ secrets.ALCHIRA_BINPUB }}
          tag_name: ${{ steps.pacver.outputs.minorTag }}
          name: Release ${{ steps.pacver.outputs.minorTag }}
          body_path: ./RELEASE.md
          files: artifacts/**
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.ALCHIRA_BINPUB }}

      - name: Publish release (Patch Tag)
        uses: softprops/action-gh-release@v2
        with:
          repository: ${{ env.PACKAGE_REPO }}
          token: ${{ secrets.ALCHIRA_BINPUB }}
          tag_name: ${{ steps.pacver.outputs.patchTag }}
          name: Release ${{ steps.pacver.outputs.patchTag }}
          body_path: ./RELEASE.md
          files: artifacts/**
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.ALCHIRA_BINPUB }}
