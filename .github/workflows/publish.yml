name: Release Binary

on:
  repository_dispatch:
    types: [trigger-publish]
  workflow_dispatch:

permissions:
  contents: write

env:
  PACKAGE_REPO: yshelldev/xcss-package
  VSCODE_REPO: yshelldev/xcss-vscode

jobs:
  bin-release:
    name: Bin Update Trigger
    runs-on: ubuntu-latest

    steps:
      - name: Checkout current repo
        uses: actions/checkout@v3

      - name: Checkout xcss-package (read-only)
        uses: actions/checkout@v3
        with:
          repository: yshelldev/xcss-package
          token: ${{ secrets.XCSS_REPO_CROSS }}
          path: core

      - name: Get version from xcss-package
        id: pacver
        run: |
          cd core
          echo "version=v$(jq -r .version package.json)" >> $GITHUB_OUTPUT

      - name: Run build script
        run: |
          chmod +x ./scripts/build.sh
          ./scripts/build.sh

      - name: Prepare artifacts
        run: |
          mkdir -p artifacts
          cp -r ./bin/* artifacts/

      - name: Publish release (version tag)
        uses: softprops/action-gh-release@v2
        with:
          repository: ${{ env.PACKAGE_REPO }}
          token: ${{ secrets.XCSS_REPO_CROSS }}
          tag_name: ${{ steps.pacver.outputs.version }}
          name: Release ${{ steps.pacver.outputs.version }}
          body_path: ./core/RELEASE.md
          files: artifacts/**
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.XCSS_REPO_CROSS }}

      - name: Publish release (latest tag)
        uses: softprops/action-gh-release@v2
        with:
          repository: ${{ env.PACKAGE_REPO }}
          token: ${{ secrets.XCSS_REPO_CROSS }}
          tag_name: latest
          name: Release latest
          body_path: ./core/RELEASE.md
          files: artifacts/**
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.XCSS_REPO_CROSS }}

