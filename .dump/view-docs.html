<!DOCTYPE html>
<html lang="en" data-dark-mode>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>xklass Docs</title>
    <link rel="stylesheet" href="1.Rules.css">
    <link rel="stylesheet" href="2.Const.css">
    <link rel="stylesheet" href="3.Basic.css">
</head>

<body>
    <style>
        :root {
            --header-height: 24rem;
            --sidebar-width: 72rem;
            --line-colour: var(--border);
            --search-box-color: var(--background-alt);
            --page-inline-padding: 10rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        body {
            margin: 0;
            display: flex;
            width: 100%;
            max-width: var(--page-width);
            padding-top: var(--header-height);
            padding-inline: var(--page-inline-padding);
        }

        #classx-header {
            border-bottom: solid 2px var(--line-colour);
            z-index: 9999;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--background-alt);
            height: var(--header-height);
        }

        #classx-header section {
            gap: 4rem;
            padding-inline: var(--page-inline-padding);
            width: 100%;
            max-width: var(--page-width);
            display: flex;
            align-items: stretch;
            justify-content: space-between;
        }

        #classx-header h2 {
            z-index: 9999;
            margin: 0;
            color: var(--text-main);
        }

        #classx-header h4 {
            color: var(--text-muted);
            margin: 0;
        }

        #classx-header div {
            flex-shrink: 0;
            width: var(--sidebar-width);
        }

        #classx-header input {
            margin: 0;
            width: 100%;
            text-align: center;
            padding-inline: 6rem;
            border: solid 1px var(--line-colour);
            border-radius: 2rem;
        }

        @media (max-width: 72rem) {
            #classx-header input {
                display: none;
            }

            #classx-sidebar {
                display: none;
            }

            #classx-main>section {
                padding-left: 0;
            }
        }

        #classx-header button {
            flex-shrink: 0;
            width: var(--sidebar-width);
            margin: 0;
        }

        #classx-main {
            min-height: 100vh;
            width: 100%;
        }

        #classx-main>section {
            padding-left: 10rem;
            padding-block: 8rem;
            border-bottom: solid 2px var(--line-colour);
            min-height: 10rem;
        }

        #classx-main .classx-section-head {
            display: flex;
            width: 100%;
            padding-bottom: 8rem;
            align-items: center;
            justify-content: space-between;
        }

        #classx-main .classx-section-head button {
            margin: 0;
        }

        #classx-main .classx-section-head h2 {
            margin: 0;
        }

        #classx-main .classx-component {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #classx-sidebar {
            flex-shrink: 0;
            border-right: solid 2px var(--line-colour);
            position: relative;
            width: var(--sidebar-width);
            overflow-y: auto;
        }

        #classx-sidebar ul {
            position: fixed;
            list-style: none;
            padding: 0;
        }

        #classx-sidebar li {
            margin: .8rem;
            width: 100%;
        }

        #classx-sidebar li button {
            opacity: .5;
        }

        #classx-sidebar li button.active {
            opacity: 1;
        }

        #classx-sidebar a {
            text-decoration: none;
        }

        #classx-sidebar a:hover {
            text-decoration: underline;
        }

        /* <style-marker> */
    </style>
    <header id="classx-header">
        <section>
            <div>
                <h2>xClass Components</h2>
                <h4>
                    <span>0</span> results found
                </h4>
            </div>
            <input id="classx-input" oninput="searchComponents(this.value)" placeholder="[ / ]">
            <button onclick="document.querySelector('html').toggleAttribute('data-dark-mode')">Toggle
                Light/Dark</button>
        </section>
    </header>
    <aside id="classx-sidebar">
        <ul>
            <!-- <sidebar-marker> -->
        </ul>
    </aside>
    <main id="classx-main">
        <!-- <main-marker> -->
        <footer></footer>
    </main>
    <script>
        let selectedSource = 'all';
        // <script-marker>
        document.addEventListener('keydown', (event) => {
            if (event.key === '/') {
                event.preventDefault();
                document.querySelector('#classx-input').focus();
            }
        });
        const filterComponents = (searchString, source) => {
            allSourceComponents['all'].forEach(element =>
                document.querySelector(element).style.display = "none");
            const filteredList = allSourceComponents[source].filter(item => (item.includes(searchString)));
            filteredList.forEach(element =>
                document.querySelector(element).style.display = "block");
        }
        const filterBySource = (source) => {
            document.querySelector('#' + selectedSource).classList.remove('active')
            selectedSource = source;
            document.querySelector('#' + source).classList.add('active')
            filterComponents(document.querySelector('#classx-input').value, source)
        }
        const searchComponents = (string) => filterComponents(string, selectedSource)
    </script>
</body>

</html>
